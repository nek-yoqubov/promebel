<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промебель — Просмотр заказа</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  body {
    background: #f5f4f0; font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; margin: 0; padding: 20px;
  }
  .card {
    background: white; border: 1.5px solid #e2dfda;
    border-radius: 12px; padding: 40px 32px;
    max-width: 400px; width: 100%; text-align: center;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase; color: #6b6760; margin-bottom: 24px; }
  .status { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .sub { font-size: 14px; color: #6b6760; margin-bottom: 24px; }
  .btn {
    display: inline-block; padding: 14px 32px;
    background: #0a0a0a; color: white; border-radius: 8px;
    text-decoration: none; font-size: 15px; font-weight: 500;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e2dfda;
    border-top-color: #0a0a0a; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #c0392b; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ПРОМЕБЕЛЬ</div>
  <div id="content">
    <div class="spinner"></div>
    <div class="sub">Проверка ссылки...</div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxzI1zAz4wMJHIctiD_Z2X_AbolzhG3th6d1TfvUvIldBMrwYwUKhp8CT1RW2X4wW1yYA/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const t = params.get("t");
const content = document.getElementById("content");

async function loadPdf() {
  if (!id || !t) {
    showError("Неверная ссылка");
    return;
  }

  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "get_pdf_url", id, t })
    });
    const data = await res.json();

    if (data.success && data.url) {
      content.innerHTML = `
        <div class="status">✅ Заказ № ${id}</div>
        <div class="sub">Ваш заказ готов. Нажмите кнопку для загрузки.</div>
        <a href="${data.url}" class="btn" target="_blank">Скачать PDF</a>
      `;
    } else {
      showError("Ссылка недействительна или заказ не найден");
    }
  } catch(e) {
    showError("Ошибка соединения");
  }
}

function showError(msg) {
  content.innerHTML = `
    <div class="status error">❌ Ошибка</div>
    <div class="sub">${msg}</div>
  `;
}

loadPdf();
</script>
</body>
</html>
