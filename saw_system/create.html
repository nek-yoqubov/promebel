<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промебель — Новый заказ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --black: #0a0a0a; --white: #f5f4f0; --gray-100: #f0eeea; --gray-200: #e2dfda;
    --gray-400: #a8a49d; --gray-600: #6b6760; --red: #c0392b; --green: #15803d;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--white); font-family: 'DM Sans', sans-serif; color: var(--black); padding-bottom: 80px; }
  header {
    position: sticky; top: 0; background: var(--white); border-bottom: 1.5px solid var(--gray-200);
    padding: 12px 20px; z-index: 100;
  }
  .header-inner { max-width: 520px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }

  main { max-width: 520px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 24px; }

  .card {
    background: white; border: 1.5px solid var(--gray-200); border-radius: 10px;
    padding: 18px; margin-bottom: 16px;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gray-600); font-family: 'DM Mono', monospace;
  }
  .btn-add {
    font-size: 12px; padding: 5px 12px; background: var(--gray-100); border: 1.5px solid var(--gray-200);
    border-radius: 5px; cursor: pointer;
  }

  .field { margin-bottom: 14px; }
  label.field-label {
    display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gray-600); margin-bottom: 6px; font-family: 'DM Mono', monospace;
  }
  input, select {
    width: 100%; padding: 11px 14px; font-size: 15px; background: var(--gray-100);
    border: 1.5px solid var(--gray-200); border-radius: 6px; outline: none;
  }
  input:focus, select:focus { border-color: var(--black); background: white; }

  .dynamic-row {
    display: grid; gap: 8px; margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .dynamic-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  
  /* Специфические колонки для разных типов */
  .row-sheet { grid-template-columns: 60px 80px 1fr 60px; }
  .row-edge { grid-template-columns: 80px 1fr 60px; }
  .row-ext { grid-template-columns: 1fr 60px; }

  .btn-remove {
    color: var(--red); background: none; border: none; font-size: 11px; cursor: pointer;
    font-family: 'DM Mono', monospace; text-align: right;
  }

  .submit-btn {
    width: 100%; padding: 16px; background: var(--black); color: white; border: none;
    border-radius: 8px; font-size: 16px; font-weight: 500; margin-top: 30px; cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #overlay {
    position: fixed; inset: 0; background: rgba(245,244,240,0.95); display: none;
    align-items: center; justify-content: center; flex-direction: column; z-index: 999;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">ПРОМЕБЕЛЬ</div>
    <a href="orders.html" style="font-size:13px; color:#555; text-decoration: none;">← Заказы</a>
  </div>
</header>

<main>
  <h1>Новый заказ</h1>

  <div class="card">
    <div class="card-header"><span class="card-title">Основная информация</span></div>
    <div class="field">
      <label class="field-label">ID заказа (из 1С)</label>
      <input id="id" placeholder="12345" oninput="checkId()">
      <div id="idHint" style="font-size:12px; margin-top:4px; min-height:18px;"></div>
    </div>
    <div class="field">
      <label class="field-label">Клиент</label>
      <input id="customer" placeholder="ФИО клиента">
    </div>
    <div class="field">
      <label class="field-label">Телефон</label>
      <input id="phone" placeholder="901234567" maxlength="9" oninput="formatPhone()">
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Листы</span>
      <button class="btn-add" onclick="addSheet()">+ Добавить</button>
    </div>
    <div id="sheets"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Кромка 0.8 мм</span>
      <button class="btn-add" onclick="addEdge08()">+ Добавить</button>
    </div>
    <div id="edge08"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Кромка 0.4 мм</span>
      <button class="btn-add" onclick="addEdge04()">+ Добавить</button>
    </div>
    <div id="edge04"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Листы извне</span>
      <button class="btn-add" onclick="addSheetExt()">+ Добавить</button>
    </div>
    <div id="sheetExt"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Кромка извне</span>
      <button class="btn-add" onclick="addEdgeExt()">+ Добавить</button>
    </div>
    <div id="edgeExt"></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">Присадка</span></div>
    <div class="field"><label class="field-label">Евровинт (шт)</label><input id="addon_euro" type="number" value="0"></div>
    <div class="field"><label class="field-label">Эксцентрик (шт)</label><input id="addon_exc" type="number" value="0"></div>
    <div class="field"><label class="field-label">Рафикс (шт)</label><input id="addon_raf" type="number" value="0"></div>
    <div class="field"><label class="field-label">Петля (шт)</label><input id="addon_hinge" type="number" value="0"></div>
    <div class="field"><label class="field-label">Прочее (шт)</label><input id="addon_other" type="number" value="0"></div>
  </div>

  <button class="submit-btn" id="createBtn" onclick="createOrder()" disabled>Создать заказ</button>
</main>

<div id="overlay"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxzI1zAz4wMJHIctiD_Z2X_AbolzhG3th6d1TfvUvIldBMrwYwUKhp8CT1RW2X4wW1yYA/exec";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token || (role !== "manager" && role !== "admin" && role !== "director")) {
  window.location.href = "index.html";
}

let idValid = false;

function showOverlay(text, status = 'wait') {
  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  let icon = status === 'success' ? '✅' : (status === 'error' ? '❌' : '⏳');
  overlay.innerHTML = `<div style="font-size:48px;margin-bottom:16px;">${icon}</div><div>${text}</div>`;
}

// Функции добавления строк
function addSheet() {
  const div = document.createElement("div");
  div.className = "dynamic-row row-sheet";
  div.innerHTML = `
    <input type="number" placeholder="шт" class="s-count">
    <input placeholder="код" class="s-code">
    <input placeholder="название" class="s-name">
    <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById("sheets").appendChild(div);
}

function addEdge08() {
  const div = document.createElement("div");
  div.className = "dynamic-row row-edge";
  div.innerHTML = `
    <input type="number" placeholder="метры" class="e-len">
    <input placeholder="код кромки" class="e-code">
    <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById("edge08").appendChild(div);
}

function addEdge04() {
  const div = document.createElement("div");
  div.className = "dynamic-row row-edge";
  div.innerHTML = `
    <input type="number" placeholder="метры" class="e-len">
    <input placeholder="код кромки" class="e-code">
    <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById("edge04").appendChild(div);
}

function addSheetExt() {
  const div = document.createElement("div");
  div.className = "dynamic-row row-ext";
  div.innerHTML = `<input placeholder="Описание листа" class="ext-val"><button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("sheetExt").appendChild(div);
}

function addEdgeExt() {
  const div = document.createElement("div");
  div.className = "dynamic-row row-ext";
  div.innerHTML = `<input placeholder="Описание кромки" class="ext-val"><button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("edgeExt").appendChild(div);
}

async function checkId() {
  const id = document.getElementById("id").value.trim();
  const hint = document.getElementById("idHint");
  if (!id) { hint.textContent = ""; idValid = false; validateForm(); return; }

  try {
    const res = await fetch(API, { method:"POST", body: JSON.stringify({action:"check_id", id, token}) });
    const data = await res.json();
    if (data.exists) {
      hint.innerHTML = `<span style="color:#c0392b">ID уже существует</span>`;
      idValid = false;
    } else {
      hint.innerHTML = `<span style="color:#15803d">ID свободен ✓</span>`;
      idValid = true;
    }
  } catch(e) { hint.textContent = "Ошибка проверки"; idValid = false; }
  validateForm();
}

function formatPhone() {
  let val = document.getElementById("phone").value.replace(/\D/g,'').slice(0,9);
  document.getElementById("phone").value = val;
  validateForm();
}

function validateForm() {
  const phone = document.getElementById("phone").value.length;
  document.getElementById("createBtn").disabled = !(idValid && phone === 9);
}

// Сбор данных
// Сбор листов с валидацией
function getSheets() {
  let c = [], co = [], n = [];
  document.querySelectorAll("#sheets .dynamic-row").forEach(r => {
    const count = parseInt(r.querySelector(".s-count").value) || 0;
    const code = r.querySelector(".s-code").value.trim();
    const name = r.querySelector(".s-name").value.trim();
    // Пропускаем если количество 0 или отрицательное или нет названия
    if (count <= 0 || !name) return;
    c.push(count);
    co.push(code || "—");
    n.push(name);
  });
  return { count: c.join("-"), code: co.join("-"), name: n.join("-") };
}

function getEdges(containerId) {
  let len = [], code = [];
  document.querySelectorAll(`#${containerId} .dynamic-row`).forEach(r => {
    const l = parseFloat(r.querySelector(".e-len").value) || 0;
    const c = r.querySelector(".e-code").value.trim();
    // Пропускаем если длина 0 или отрицательная или нет кода
    if (l <= 0 || !c) return;
    len.push(l);
    code.push(c);
  });
  return { len: len.join("-"), code: code.join("-") };
}

function getExt(containerId) {
  let vals = [];
  document.querySelectorAll(`#${containerId} .dynamic-row`).forEach(r => {
    const v = r.querySelector(".ext-val").value.trim();
    if (v) vals.push(v); // пропускаем пустые
  });
  return vals.join(" | ");
}

// Валидация присадки — только положительные числа
function getAddon(id) {
  const val = parseInt(document.getElementById(id).value) || 0;
  return val > 0 ? val : 0;
}

async function createOrder() {
  const btn = document.getElementById("createBtn");
  btn.disabled = true;
  showOverlay("Создание заказа...");

  const s = getSheets();
  const e08 = getEdges("edge08");
  const e04 = getEdges("edge04");

  const payload = {
    action: "create_order",
    token: token,
    id: document.getElementById("id").value.trim(),
    customer: document.getElementById("customer").value.trim(),
    phone: "992" + document.getElementById("phone").value,
    sheet_count: s.count,
    sheet_code: s.code,
    sheet_name: s.name,
    edge_08_len: e08.len,
    edge_08_code: e08.code,
    edge_04_len: e04.len,
    edge_04_code: e04.code,
    sheet_ext: getExt("sheetExt"),
    edge_ext: getExt("edgeExt"),
    addon_euro: getAddon("addon_euro"),
    addon_exc: getAddon("addon_exc"),
    addon_raf: getAddon("addon_raf"),
    addon_hinge: getAddon("addon_hinge"),
    addon_other: getAddon("addon_other")
  };

  try {
    const res = await fetch(API, { method: "POST", body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.success === true) {
      showOverlay("Заказ успешно создан!", "success");
      setTimeout(() => window.location.href = "orders.html", 1500);
    } else {
      throw new Error(result.error || "Неизвестная ошибка");
    }
  } catch (err) {
    showOverlay("Ошибка: " + err.message, "error");
    btn.disabled = false;
    setTimeout(() => { document.getElementById("overlay").style.display = "none"; }, 3000);
  }
}
</script>
</body>
</html>
