<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промебель — Шоурум</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
  body {
    background: #111; color: white; font-family: 'DM Sans', sans-serif;
    min-height: 100vh; padding: 20px; text-align: center; margin:0;
  }
  header { margin-bottom: 30px; font-family: 'DM Mono', monospace; font-size: 14px; opacity: 0.6; }
  h1 { font-size: 28px; margin-bottom: 40px; }
  #orders { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .order {
    background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
    padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
    font-size: 18px;
  }
  .order-id { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
  .badge {
    padding: 8px 20px; border-radius: 30px; font-weight: 500; font-size: 15px;
  }
  /* Стили для статусов (берут первое слово из названия статуса) */
  .Выгрузка { background: #2563eb; }
  .Пила { background: #ea580c; }
  .Кромка { background: #7c3aed; }
  .Присадка { background: #b45309; }
  .Готово { background: #15803d; }
  .✅ { background: #4b5563; }
  
  .empty { color: #666; font-size: 18px; padding: 80px 20px; }
</style>
</head>
<body>

<header>ПРОМЕБЕЛЬ • ШОУРУМ</header>
<h1>Текущие заказы</h1>

<div id="orders"></div>
<div style="margin-top:30px; font-size:13px; color:#555;" id="updateTime">Обновлено: только что</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxzI1zAz4wMJHIctiD_Z2X_AbolzhG3th6d1TfvUvIldBMrwYwUKhp8CT1RW2X4wW1yYA/exec";

async function loadPublicOrders() {
  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "get_public_orders" })
    });
    const data = await res.json();
    const orders = data.orders || [];

    const container = document.getElementById("orders");
    container.innerHTML = "";

    if (orders.length === 0) {
      container.innerHTML = `<div class="empty">Пока нет активных заказов</div>`;
      return;
    }

    orders.forEach(order => {
      const div = document.createElement("div");
      div.className = "order";
      
      // Берем первое слово статуса для CSS класса (например "Выгрузка" из "Выгрузка со склада")
      const statusClass = order.status ? order.status.split(' ')[0] : '✅';
      
      // Исправлено согласно техзаданию (пункт 2): чистый вывод ID без лишних ссылок
      div.innerHTML = `
        <div class="order-id">№ ${order.id}</div>
        <div class="badge ${statusClass}">${order.status}</div>
      `;
      container.appendChild(div);
    });

    document.getElementById("updateTime").textContent = `Обновлено: ${new Date().toLocaleTimeString('ru-RU')}`;
  } catch (e) {
    console.error("Ошибка загрузки:", e);
  }
}

// Автообновление каждые 30 секунд
setInterval(loadPublicOrders, 30000);
loadPublicOrders();
</script>
</body>
</html>
