<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промебель — Панель управления</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root { --black: #0a0a0a; --white: #f5f4f0; --gray-100: #f0eeea; --gray-200: #e2dfda; --gray-600: #6b6760; }
  body { background: var(--white); font-family: 'DM Sans', sans-serif; margin:0; padding:20px; min-height:100vh; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }
  .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .card {
    background: white; border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 24px;
    text-decoration: none; color: var(--black); transition: all 0.2s;
  }
  .card:hover { border-color: var(--black); transform: translateY(-2px); }
  .card h3 { margin: 8px 0 4px; font-size: 17px; }
  .card p { color: var(--gray-600); font-size: 13px; }
  .btn-logout { background:none; border:none; font-size:13px; cursor:pointer; color: var(--gray-600); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">ПРОМЕБЕЛЬ</div>
    <button onclick="logout()" class="btn-logout">ВЫЙТИ</button>
  </div>

  <h1 style="margin-bottom:30px; font-size: 28px; letter-spacing: -0.02em;">Панель управления</h1>

  <div class="menu" id="menu"></div>
</div>

<script>
const role = localStorage.getItem("role") || "user";
const token = localStorage.getItem("token");

// Если нет токена — на вход
if (!token) window.location.href = "login.html";

const menu = document.getElementById("menu");

// Список разделов согласно техзаданию
const items = [
  { title: "Заказы", desc: "Список и статусы производства", href: "orders.html", roles: ["user","manager","admin"] },
  { title: "Новый заказ", desc: "Оформление новой заявки", href: "create.html", roles: ["manager","admin","director"] },
  { title: "Шоурум", desc: "Экран для клиентов", href: "display.html", roles: ["all"] },
  { title: "Настройки", desc: "Смена пароля", href: "settings.html", roles: ["all"] },
  { title: "Админ", desc: "Пользователи и система", href: "admin.html", roles: ["admin"] }
];

items.forEach(item => {
  if (item.roles.includes("all") || item.roles.includes(role)) {
    menu.innerHTML += `
      <a href="${item.href}" class="card">
        <h3>${item.title}</h3>
        <p>${item.desc}</p>
      </a>`;
  }
});

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>
</body>
</html>
