<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Создание заказа</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    input.error {
      border-color: red;
    }

    input.ok {
      border-color: green;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Новый заказ</h2>

<input id="id" placeholder="ID из 1С" oninput="checkId()">
<input id="customer" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон">




<h3>Листы</h3>
<div id="sheets"></div>
<button onclick="addSheet()">+ Добавить лист</button>

<h3>Кромка 0.8мм</h3>
<div id="edge08"></div>
<button onclick="addEdge08()">+ Добавить</button>

<h3>Кромка 0.4мм</h3>
<div id="edge04"></div>
<button onclick="addEdge04()">+ Добавить</button>

<h3>Листы извне</h3>
<div id="sheetExt"></div>
<button onclick="addSheetExt()">+ Добавить</button>

<h3>Кромка извне</h3>
<div id="edgeExt"></div>
<button onclick="addEdgeExt()">+ Добавить</button>


<h3>Присадка</h3>
<input id="addon_euro" placeholder="Евровинт (шт)">
<input id="addon_exc" placeholder="Эксцентрик (шт)">
<input id="addon_raf" placeholder="Рафикс (шт)">
<input id="addon_hinge" placeholder="Петля (шт)">
<input id="addon_other" placeholder="Прочее (шт)">




<button onclick="createOrder()">Создать</button>

<p id="status"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbxzI1zAz4wMJHIctiD_Z2X_AbolzhG3th6d1TfvUvIldBMrwYwUKhp8CT1RW2X4wW1yYA/exec";

function getAddonData() {
  const euro  = document.getElementById("addon_euro").value.trim();
  const exc   = document.getElementById("addon_exc").value.trim();
  const raf   = document.getElementById("addon_raf").value.trim();
  const hinge = document.getElementById("addon_hinge").value.trim();
  const other = document.getElementById("addon_other").value.trim();

  return {
    euro:  euro === "" ? "" : Number(euro),
    exc:   exc === "" ? "" : Number(exc),
    raf:   raf === "" ? "" : Number(raf),
    hinge: hinge === "" ? "" : Number(hinge),
    other: other === "" ? "" : Number(other)
  };
}

function addSheetExt() {
  const div = document.createElement("div");
  div.innerHTML = `
    <input placeholder="описание">
    <hr>
  `;
  document.getElementById("sheetExt").appendChild(div);
}

function addEdgeExt() {
  const div = document.createElement("div");
  div.innerHTML = `
    <input placeholder="описание">
    <hr>
  `;
  document.getElementById("edgeExt").appendChild(div);
}

function addSheet() {
  const container = document.getElementById("sheets");

  const div = document.createElement("div");

  div.innerHTML = `
    <input placeholder="шт">
    <input placeholder="код">
    <input placeholder="имя">
    <hr>
  `;

  container.appendChild(div);
}
function addEdge04() {
  const container = document.getElementById("edge04");

  const div = document.createElement("div");

  div.innerHTML = `
    <input placeholder="метры">
    <input placeholder="код">
    <hr>
  `;

  container.appendChild(div);
}

function getEdge04Data() {
  const rows = document.querySelectorAll("#edge04 div");

  let lengths = [];
  let codes = [];

  rows.forEach(row => {
    const inputs = row.querySelectorAll("input");

    const len = inputs[0].value.trim();
    const code = inputs[1].value.trim();

    if (len || code) {
      lengths.push(len);
      codes.push(code);
    }
  });

  return {
    len: lengths.join("-"),
    code: codes.join("-")
  };
}

function getSheetExtData() {
  const rows = document.querySelectorAll("#sheetExt div");
  const arr = [];

  rows.forEach(row => {
    const val = row.querySelector("input").value.trim();
    if (val) arr.push(val);
  });

  return arr.join("-");
}

function getEdgeExtData() {
  const rows = document.querySelectorAll("#edgeExt div");
  const arr = [];

  rows.forEach(row => {
    const val = row.querySelector("input").value.trim();
    if (val) arr.push(val);
  });

  return arr.join("-");
}

function addEdge08() {
  const container = document.getElementById("edge08");

  const div = document.createElement("div");

  div.innerHTML = `
    <input placeholder="метры">
    <input placeholder="код">
    <hr>
  `;

  container.appendChild(div);
}

function getEdge08Data() {
  const rows = document.querySelectorAll("#edge08 div");

  let lengths = [];
  let codes = [];

  rows.forEach(row => {
    const inputs = row.querySelectorAll("input");

    const len = inputs[0].value.trim();
    const code = inputs[1].value.trim();

    if (len || code) {
      lengths.push(len);
      codes.push(code);
    }
  });

  return {
    len: lengths.join("-"),
    code: codes.join("-")
  };
}

function getSheetsData() {
  const container = document.getElementById("sheets");
  const rows = container.querySelectorAll("div");

  let counts = [];
  let codes = [];
  let names = [];

  rows.forEach(row => {
    const inputs = row.querySelectorAll("input");

    const count = inputs[0].value.trim();
    const code = inputs[1].value.trim();
    const name = inputs[2].value.trim();

    if (count || code || name) {
      counts.push(count);
      codes.push(code);
      names.push(name);
    }
  });

  return {
    count: counts.join("-"),
    code: codes.join("-"),
    name: names.join("-")
  };
}



// ===== ПРОВЕРКА ID =====
async function checkId() {
  const idInput = document.getElementById("id");
  const id = idInput.value.trim();

  if (!id) {
    idInput.classList.remove("error", "ok");
    return;
  }

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "check_id",
      id
    })
  });

  const data = await res.json();

  if (data.exists) {
    idInput.classList.add("error");
    idInput.classList.remove("ok");
  } else {
    idInput.classList.add("ok");
    idInput.classList.remove("error");
  }
}

// ===== СОЗДАНИЕ =====
async function createOrder() {
  const addon = getAddonData();
  const sheetExt = getSheetExtData();
  const edgeExt = getEdgeExtData();
  const edge04 = getEdge04Data();
  const edge08 = getEdge08Data();
  const id = document.getElementById("id").value.trim();
  const customer = document.getElementById("customer").value;
  const phone = document.getElementById("phone").value;

  if (!id) {
    return setStatus("ID обязателен", true);
  }

  const sheets = getSheetsData();

const res = await fetch(API, {
  method: "POST",
  body: JSON.stringify({
    action: "create_order",
    id,
    customer,
    phone,
    sheet_count: sheets.count,
    sheet_code: sheets.code,
    edge_08_len: edge08.len,
    edge_08_code: edge08.code,
    edge_04_len: edge04.len,
    edge_04_code: edge04.code,
    sheet_ext: sheetExt,
    edge_ext: edgeExt,
    addon_euro: addon.euro,
    addon_exc: addon.exc,
    addon_raf: addon.raf,
    addon_hinge: addon.hinge,
    addon_other: addon.other,
    sheet_name: sheets.name
    
  })
  
});


  const data = await res.json();

  if (data.error === "ID_EXISTS") {
    setStatus("ID уже существует", true);
  } else {
    setStatus("Создано");

    // очистка формы
    document.getElementById("id").value = "";
    document.getElementById("customer").value = "";
    document.getElementById("phone").value = "";

    document.getElementById("id").classList.remove("ok", "error");
  }
}

function setStatus(text, isError = false) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.style.color = isError ? "red" : "green";
}
</script>

</body>
</html>
