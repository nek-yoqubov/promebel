<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pro Mebel Display</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000000;
}

.viewport{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* трек со всеми слайдами друг под другом по вертикали —
   именно он двигается через translateY, как при свайпе */
.track{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    will-change: transform;
}

.slide{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.slide img{
    /* оригинальные пропорции, без обрезки и без растяжения */
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
}

</style>
</head>
<body>

<div class="viewport">
    <div class="track" id="track"></div>
</div>

<script>

/* ====== список файлов слайдов (JPG, как есть) ====== */
const images = [
    "1.JPG",
    "2.JPG",
    "3.JPG",
    "4.JPG",
    "5.JPG",
    "6.JPG",
    "7.JPG",
    "8.JPG",
    "9.JPG"
];

const track = document.getElementById("track");
const total = images.length;

images.forEach(src => {
    const slide = document.createElement("div");
    slide.className = "slide";

    const img = document.createElement("img");
    img.src = src;
    img.alt = "";

    slide.appendChild(img);
    track.appendChild(slide);
});

let current = 0; // индекс слайда, который сейчас наверху (виден)
const slideHeight = window.innerHeight;

/* обычный свайп вверх — на один слайд, с анимацией */
const SWIPE_DURATION = 650; // мс, ощущается как уверенный свайп пальцем

function setPosition(offsetIndex, withTransition, durationMs){
    track.style.transition = withTransition
        ? `transform ${durationMs}ms cubic-bezier(0.22, 0.61, 0.36, 1)`
        : "none";
    track.style.transform = `translateY(${-offsetIndex * slideHeight}px)`;
}

/* стартовая позиция без анимации */
setPosition(current, false, 0);

function swipeNext(){

    const isLast = (current === total - 1);

    if(isLast){
        /* после последнего слайда — быстрый обратный свайп
           ПРЯМО до первого слайда, не останавливаясь на
           промежуточных. Технически: едем в отрицательном
           направлении на (total - 1) слайдов одним быстрым
           движением, заметно быстрее обычного свайпа. */
        const FAST_REWIND_DURATION = 900; // быстро пролетает все 8 слайдов разом, но достаточно долго, чтобы взгляд успел зацепить движение, а не увидел просто мерцание

        current = 0;
        setPosition(current, true, FAST_REWIND_DURATION);

    } else {
        /* обычный свайп вверх на один слайд */
        current = current + 1;
        setPosition(current, true, SWIPE_DURATION);
    }

}

setInterval(swipeNext, 2800);

/* пересчёт при изменении размеров экрана — высота слайда
   завязана на текущий innerHeight, поэтому при ресайзе
   просто переустанавливаем позицию без анимации */
window.addEventListener("resize", () => {
    setPosition(current, false, 0);
});

/* === защита от случайных тапов на тач-дисплее === */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("touchstart", e => {
    if(e.touches.length > 1) e.preventDefault();
}, {passive:false});

/* === автопереход в полноэкранный режим по первому касанию === */
function goFullscreen(){
    const el = document.documentElement;
    if(el.requestFullscreen){ el.requestFullscreen().catch(()=>{}); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
    document.removeEventListener("click", goFullscreen);
    document.removeEventListener("touchend", goFullscreen);
}
document.addEventListener("click", goFullscreen, {once:true});
document.addEventListener("touchend", goFullscreen, {once:true});

</script>

</body>
</html>
