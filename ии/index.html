<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pro Mebel Display</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000000;
}

.viewport{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* лента со всеми слайдами друг под другом —
   физически едет вверх через translateY */
.track{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    will-change: transform;
}

/* каждый слайд занимает ровно треть экрана по высоте —
   именно поэтому одновременно видно 3 штуки */
.slide{
    width:100%;
    height:33.3333vh;

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.slide img{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;

    /* масштаб меняется самим JS через --scale,
       но плавность даёт именно этот transition */
    transform:scale(var(--scale, .8));
    opacity:var(--opacity, .55);

    transition:
        transform 650ms cubic-bezier(0.22, 0.61, 0.36, 1),
        opacity 650ms ease;
}

</style>
</head>
<body>

<div class="viewport">
    <div class="track" id="track"></div>
</div>

<script>

/* ====== список файлов слайдов ====== */
const images = [
    "1.JPG",
    "2.JPG",
    "3.JPG",
    "4.JPG",
    "5.JPG",
    "6.JPG",
    "7.JPG",
    "8.JPG",
    "9.JPG"
];

const total = images.length;

/* три копии подряд — чтобы лента всегда имела соседей
   сверху и снизу, без обрывов на краях массива */
const sequence = [...images, ...images, ...images];

const track = document.getElementById("track");

const slideEls = sequence.map(src => {
    const slide = document.createElement("div");
    slide.className = "slide";

    const img = document.createElement("img");
    img.src = src;
    img.alt = "";

    slide.appendChild(img);
    track.appendChild(slide);

    return img;
});

/* стартуем со второй копии, чтобы были соседи и сверху, и снизу */
let current = total; // индекс в sequence, который сейчас в центре

const SWIPE_DURATION = 650;
const REWIND_DURATION = 900;

function applyScales(){
    slideEls.forEach((img, i) => {
        if(i === current){
            img.style.setProperty("--scale", "1");
            img.style.setProperty("--opacity", "1");
        } else if(i === current - 1 || i === current + 1){
            img.style.setProperty("--scale", ".8");
            img.style.setProperty("--opacity", ".55");
        } else {
            img.style.setProperty("--scale", ".8");
            img.style.setProperty("--opacity", "0");
        }
    });
}

function setTrackPosition(withTransition, durationMs){
    const slideHeight = window.innerHeight / 3;
    /* центрируем так, чтобы слайд current оказался в среднем слоте экрана */
    const offset = (current - 1) * slideHeight;

    track.style.transition = withTransition
        ? `transform ${durationMs}ms cubic-bezier(0.22, 0.61, 0.36, 1)`
        : "none";
    track.style.transform = `translateY(${-offset}px)`;
}

/* стартовая позиция без анимации */
applyScales();
setTrackPosition(false, 0);

function next(){

    const isLast = ((current - total) % total === total - 1);

    if(isLast){
        /* откатываем индекс на одну "копию" назад,
           чтобы визуально лента прыгнула на самый верх
           последовательности — это и даёт быстрый рывок
           назад к 1-му слайду после прохождения 9-го */
        current = current - (total - 1);
        applyScales();
        setTrackPosition(true, REWIND_DURATION);
    } else {
        current = current + 1;
        applyScales();
        setTrackPosition(true, SWIPE_DURATION);
    }

}

setInterval(next, 2800);

window.addEventListener("resize", () => {
    setTrackPosition(false, 0);
});

/* === защита от случайных тапов на тач-дисплее === */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("touchstart", e => {
    if(e.touches.length > 1) e.preventDefault();
}, {passive:false});

/* === автопереход в полноэкранный режим по первому касанию === */
function goFullscreen(){
    const el = document.documentElement;
    if(el.requestFullscreen){ el.requestFullscreen().catch(()=>{}); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
    document.removeEventListener("click", goFullscreen);
    document.removeEventListener("touchend", goFullscreen);
}
document.addEventListener("click", goFullscreen, {once:true});
document.addEventListener("touchend", goFullscreen, {once:true});

</script>

</body>
</html>
